<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 — Yolki Pet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700&display=swap"></noscript>
<style>
  :root {
    --primary: #01BCB5;
    --secondary: #A76FFF;
    --accent: #FFB139;
    --bg: #FAFAF8;
    --text-primary: #040404;
    --text-muted: #6B6B6B;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .page-404 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 1200px;
    padding: 40px;
    position: relative;
    z-index: 2;
  }

  .content-left {
    max-width: 380px;
  }

  .content-left h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 3.5vw, 38px);
    line-height: 1.3;
    color: var(--text-primary);
    margin-bottom: 28px;
  }

  .home-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--text-primary);
    text-decoration: none;
    background: var(--white);
    border: 1.5px solid #E0DFDB;
    border-radius: 50px;
    padding: 12px 16px 12px 24px;
    transition: all 0.3s;
  }

  .home-btn:hover {
    border-color: var(--primary);
    box-shadow: 0 4px 20px rgba(1, 188, 181, 0.15);
    transform: translateY(-2px);
  }

  .btn-arrow {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s;
  }

  .home-btn:hover .btn-arrow {
    transform: translateX(4px);
  }

  /* Decorative 404 */
  .deco-404 {
    position: absolute;
    right: -5%;
    top: 50%;
    transform: translateY(-50%);
    width: 60vw;
    max-width: 700px;
    height: 80vh;
    pointer-events: none;
  }

  /* Ribbon path with 404 text */
  .ribbon-container {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .big-number {
    font-family: 'Poppins', sans-serif;
    font-weight: 900;
    font-size: clamp(200px, 30vw, 400px);
    color: var(--primary);
    opacity: 0.15;
    line-height: 0.85;
    letter-spacing: -10px;
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
  }

  /* Swirl shape */
  .swirl-shape {
    position: absolute;
    right: 5%;
    top: 50%;
    transform: translateY(-50%) rotate(-15deg);
    width: 450px;
    height: 450px;
  }

  .swirl-ring {
    width: 100%;
    height: 100%;
    border: 80px solid var(--primary);
    border-radius: 50%;
    position: relative;
    opacity: 0.2;
  }

  .swirl-tail {
    position: absolute;
    bottom: -30px;
    left: 50%;
    width: 300px;
    height: 80px;
    background: var(--primary);
    opacity: 0.2;
    border-radius: 40px;
    transform: rotate(-35deg) translateX(-50%);
    transform-origin: left center;
  }

  /* Floating dots */
  .dot {
    position: absolute;
    border-radius: 50%;
    background: var(--secondary);
    opacity: 0.25;
  }

  .dot-1 { width: 20px; height: 20px; right: 30%; top: 20%; animation: float1 6s ease-in-out infinite; }
  .dot-2 { width: 14px; height: 14px; right: 15%; top: 35%; background: var(--accent); animation: float2 8s ease-in-out infinite; }
  .dot-3 { width: 24px; height: 24px; right: 45%; bottom: 25%; animation: float3 7s ease-in-out infinite; }
  .dot-4 { width: 10px; height: 10px; right: 25%; bottom: 35%; background: var(--primary); opacity: 0.4; animation: float1 5s ease-in-out infinite; }
  .dot-5 { width: 16px; height: 16px; right: 50%; top: 40%; background: var(--accent); animation: float2 9s ease-in-out infinite; }

  @keyframes float1 {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  @keyframes float2 {
    0%, 100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-10px) translateX(8px); }
  }
  @keyframes float3 {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(12px); }
  }

  /* 404 text on ribbon */
  .ribbon-text {
    position: absolute;
    font-family: 'Poppins', sans-serif;
    font-weight: 900;
    color: var(--secondary);
    opacity: 0.15;
    user-select: none;
  }

  .rt-1 { font-size: 48px; right: 20%; top: 18%; transform: rotate(-25deg); }
  .rt-2 { font-size: 36px; right: 8%; top: 55%; transform: rotate(15deg); }
  .rt-3 { font-size: 42px; right: 40%; bottom: 20%; transform: rotate(-10deg); }
  .rt-4 { font-size: 28px; right: 55%; top: 30%; transform: rotate(30deg); opacity: 0.1; }

  /* Mascot */
  .mascot-404 {
    position: absolute;
    right: 28%;
    top: 48%;
    transform: translateY(-50%);
    z-index: 3;
    animation: mascotBounce 3s ease-in-out infinite;
  }

  .mascot-404 img {
    height: 80px;
    filter: drop-shadow(0 8px 20px rgba(1, 188, 181, 0.3));
  }

  @keyframes mascotBounce {
    0%, 100% { transform: translateY(-50%); }
    50% { transform: translateY(calc(-50% - 10px)); }
  }

  @media (prefers-reduced-motion: reduce) {
    .mascot-404, .dot { animation: none !important; }
    * { transition-duration: 0.01ms !important; }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .page-404 {
      flex-direction: column;
      text-align: center;
      justify-content: center;
      min-height: 100vh;
    }
    .content-left { max-width: 100%; }
    .big-number { font-size: 180px; opacity: 0.1; right: 50%; transform: translate(50%, -50%); }
    .swirl-shape { width: 250px; height: 250px; right: -10%; }
    .swirl-ring { border-width: 50px; }
    .mascot-404 { right: 40%; top: 30%; }
    .ribbon-text { display: none; }
  }
</style>
</head>

          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </span>
    </a>
  </div>
</div>
